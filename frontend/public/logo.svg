<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none">
  <!-- Symbol: two converging lines forming stylized F + speech/flow waves -->
  <g>
    <!-- Vertical bar of F -->
    <rect x="2" y="4" width="5" height="32" rx="2.5" fill="#0066FF"/>
    <!-- Top horizontal bar -->
    <rect x="7" y="4" width="14" height="5" rx="2.5" fill="#0066FF"/>
    <!-- Mid horizontal bar -->
    <rect x="7" y="16.5" width="10" height="5" rx="2.5" fill="#00E5A0"/>
    <!-- Flow wave 1 - right side -->
    <path d="M26 10 C30 10 32 16 36 16 C40 16 42 10 46 10" stroke="#0066FF" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Flow wave 2 - converging (green accent) -->
    <path d="M26 20 C29 20 31 24 34 24 C37 24 39 20 42 20" stroke="#00E5A0" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Flow wave 3 - smallest -->
    <path d="M26 29 C28 29 30 32 32 32 C34 32 36 29 38 29" stroke="#0066FF" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  </g>
  <!-- Wordmark -->
  <text x="56" y="28" font-family="'DM Sans', system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5" fill="#0A0A0F">fluxa</text>
</svg>
